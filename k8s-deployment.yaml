apiVersion: apps/v1
kind: Deployment
metadata:
  name: aks-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aks-api
  template:
    metadata:
      labels:
        app: aks-api
    spec:
      containers:
      - name: aks-api
        image: aksdevopsacrjdm0521.azurecr.io/aks-api:latest
        ports:
        - containerPort: 8000

        volumeMounts:
        - name: secrets-store
          mountPath: "/mnt/secrets"
          readOnly: true

      volumes:
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "azure-kv-secrets"